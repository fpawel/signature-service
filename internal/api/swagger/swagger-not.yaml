swagger: '2.0'
info:
  title: Signature Service
  version: 1.0.0
  description: |
    Minimal API specification for the signature service coding challenge.

    The service creates signature devices and uses them to sign transaction data.
    For each signing request, the service constructs and signs the following value:

      <signature_counter>_<data_to_be_signed>_<last_signature_base64_encoded>

    For the first signature of a device, last_signature is base64(device_id).
basePath: /
schemes:
  - http
consumes:
  - application/json
produces:
  - application/json
paths:
  /devices:
    post:
      summary: Create a signature device
      description: |
        Creates a signature device.

        The request provides the device ID, the signature algorithm, and an optional label.
        A new key pair is generated and assigned to the device during creation.
      operationId: CreateSignatureDevice
      parameters:
        - name: body
          in: body
          required: true
          description: Signature device creation payload.
          schema:
            $ref: '#/definitions/CreateSignatureDeviceRequest'
      responses:
        '201':
          description: Signature device created.
          schema:
            $ref: '#/definitions/SignatureDeviceResponse'
        '400':
          description: Invalid request.
          schema:
            type: string
        '409':
          description: Device already exists.
          schema:
            type: string
        '500':
          description: Internal server error.
          schema:
            type: string

  /devices/{deviceId}/signatures:
    post:
      summary: Create a signature
      description: |
        Creates a signature for the provided transaction data using the specified device.

        The response contains the base64-encoded signature and the exact signed_data value
        that was signed.
      operationId: SignTransaction
      parameters:
        - name: deviceId
          in: path
          required: true
          description: Signature device ID.
          type: string
          format: uuid
          pattern: '^[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[1-5][0-9a-fA-F]{3}-[89abAB][0-9a-fA-F]{3}-[0-9a-fA-F]{12}$'
          x-nullable: false
        - name: body
          in: body
          required: true
          description: Transaction data to sign.
          schema:
            $ref: '#/definitions/SignTransactionRequest'
      responses:
        '201':
          description: Signature created.
          schema:
            $ref: '#/definitions/SignatureResponse'
        '400':
          description: Invalid request.
          schema:
            type: string
        '404':
          description: Device not found.
          schema:
            type: string
        '500':
          description: Internal server error.
          schema:
            type: string

definitions:
  CreateSignatureDeviceRequest:
    type: object
    description: Request payload for signature device creation.
    required:
      - id
      - algorithm
    properties:
      id:
        type: string
        format: uuid
        pattern: '^[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[1-5][0-9a-fA-F]{3}-[89abAB][0-9a-fA-F]{3}-[0-9a-fA-F]{12}$'
        x-nullable: false
        description: Unique device identifier.
      algorithm:
        type: string
        enum:
          - ECC
          - RSA
        x-nullable: false
        description: Signature algorithm assigned to the device.
      label:
        type: string
        minLength: 1
        x-nullable: false
        description: Optional human-readable device label.
    additionalProperties: false

  SignTransactionRequest:
    type: object
    description: Request payload for signature creation.
    required:
      - data
    properties:
      data:
        type: string
        minLength: 1
        x-nullable: false
        description: Raw transaction data to sign.
    additionalProperties: false

  SignatureDeviceResponse:
    type: object
    description: Signature device creation result.
    required:
      - id
      - public_key_pem
    properties:
      id:
        type: string
        format: uuid
        x-nullable: false
        description: Device ID.
      public_key_pem:
        type: string
        x-nullable: false
        description: Public key in PEM format.
    additionalProperties: false

  SignatureResponse:
    type: object
    description: Signature creation result.
    required:
      - signature
      - signed_data
    properties:
      signature:
        type: string
        x-nullable: false
        description: Base64-encoded signature.
      signed_data:
        type: string
        x-nullable: false
        description: Secured data string that was signed.
    additionalProperties: false
